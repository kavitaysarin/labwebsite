name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes ./out to GitHub Pages.
# Prerequisites (one-time, in the GitHub repo — see DEPLOYMENT.md):
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → add repository secret
#      NEXT_PUBLIC_WEB3FORMS_KEY (the Web3Forms access key) so the Contact form
#      sends. Without it the form falls back to its safe "email us" notice.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Auto-detected base path (e.g. "/labwebsite" for a project site).
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Public Web3Forms key (safe to expose; kept out of git — supplied as a secret).
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
